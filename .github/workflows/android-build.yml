name: Build Android App (APK & AAB)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Release and Debug Variants
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Regenerate and Fix Android Icons and Splashes
        run: |
          python3 generate_assets.py

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Regenerate and Fix Gradle Wrapper
        run: |
          cd android
          echo "=== Regenerating Gradle Wrapper using runner pre-installed Gradle ==="
          gradle wrapper --gradle-version 8.11.1
          
          # Fix line endings of gradlew shell script to prevent bad interpreter errors
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          echo "Gradle wrapper successfully regenerated."

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Build Android APKs (Debug & Release)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build Android AAB (Release Bundle)
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload APKs (Debug & Release)
        uses: actions/upload-artifact@v4
        with:
          name: ZoyaAI-APKs
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk

      - name: Upload AAB (Release Bundle)
        uses: actions/upload-artifact@v4
        with:
          name: ZoyaAI-AAB
          path: android/app/build/outputs/bundle/release/*.aab
