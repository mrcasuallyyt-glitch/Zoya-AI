name: Build Android App (APK & AAB)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Release and Debug Variants
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Fix Gradle Wrapper Permissions and Line Endings
        run: |
          cd android
          # Fix line endings of gradlew shell script to prevent bad interpreter errors
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          echo "Gradle wrapper permissions and line endings successfully fixed."

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Android AAB (Release Bundle)
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZoyaAI-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZoyaAI-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
